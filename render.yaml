services:
  - type: worker
    name: nud-coffee-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: GROUP_CHAT_ID
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: DB_PATH
        value: /tmp/nud_coffee.db
