services:
  - type: worker
    name: nud-coffee-bot
    env: docker
    disk:
      name: nud-coffee-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: GROUP_CHAT_ID
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: DB_PATH
        value: /data/nud_coffee.db
